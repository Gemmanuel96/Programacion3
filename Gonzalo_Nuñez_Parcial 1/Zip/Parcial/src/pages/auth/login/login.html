<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="stylesheet" href="./login.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login 🍕</title>
</head>

<body>
    <main>

        <div class="form-container">

            <h1>food store</h1>
            <h2>Iniciar Sesion</h2>

            <form action="" class="formulario" id="formulario-login">

                <div id="inputs-box" class="inputs-box">
                    <!-- Email -->
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email" placeholder="tucorreo@ejemplo.com" required>

                    <!-- Contraseña -->
                    <label for="contrasenia">Contraseña:</label>
                    <input type="password" id="contrasenia" name="contrasenia" placeholder="Ingrese 8 carateres"
                        required>

                    <button type="submit">Ingresar</button>

            </form>

            <div id="enlace-registro" class="login-container">
                <p>¿No tenés cuenta? <a href="../registro/registro.html" class="enlace">Registrate acá</a></p>
            </div>

        </section>

    </main>
    <script src="login.ts" type="module"></script>
</body>

</html>
