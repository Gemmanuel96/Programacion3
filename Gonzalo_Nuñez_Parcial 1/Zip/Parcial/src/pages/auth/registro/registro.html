<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="registro.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
</head>

<body>
    <main>

        <section class="login-container">

            <h1>food store</h1>
            <h2>Registrarse </h2>

            <form action="" class="formulario" id="formulario-login">

                <div id="inputs-box" class="inputs-box">
                    <!-- //Nombre -->
                    <label for="nombre-completo">Nombre completo: </label>
                    <input type="text" id="nombre" name="nombre" required placeholder="ej: Juan Perez"
                        autocomplete="off">

                    <!-- //Email -->
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>

                    <!-- //Contraseña -->
                    <label for="contrasenia">Contraseña:</label>
                    <input type="password" id="contrasenia" name="contrasenia" placeholder="Ingrese 8 carateres"
                        required autocomplete="off">

                    <label for="rol">Rol:</label>
                    <select name="rol" id="rol" required>
                        <option value="client">Cliente</option>
                        <option value="admin">Administrador</option>
                    </select>

                </div>
                <button type="submit" id="btnRegistro">Registrarse</button>

            </form>
            <p>¿Tenés cuenta? <a href="../login/login.html" class="enlace">Iniciar Sesion</a> </p>
        </section>

    </main>

    <script src="registro.ts" type="module"></script>

</html>
